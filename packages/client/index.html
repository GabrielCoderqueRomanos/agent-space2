<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Space</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #050510;
        overflow: hidden;
        font-family: 'Courier New', monospace;
        display: flex;
        flex-direction: row;
      }
      #game-container {
        flex: 1;
        height: 100%;
        overflow: hidden;
        position: relative;
      }
      #game-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
      #hud {
        width: 340px;
        flex-shrink: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border-left: 1px solid rgba(0, 255, 170, 0.12);
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <div id="hud"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
